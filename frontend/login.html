<main class="w-full max-w-md bg-surface-container-lowest border border-outline-variant rounded-card shadow-level-2 p-xl">
<!-- Top Section -->
<header class="text-center mb-xl">
<div class="flex justify-center items-center gap-sm mb-sm">
<h1 class="font-headline-lg text-headline-lg text-on-surface">AssetFlow</h1>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">Enterprise Asset & Resource Management</p>
</header>
<!-- Middle Section -->
<form class="flex flex-col gap-md" id="loginForm">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-input px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary focus:ring-opacity-50 transition-shadow" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
<span class="hidden font-body-sm text-body-sm text-error mt-1" id="emailError">Please enter a valid email address.</span>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-input px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary focus:ring-opacity-50 transition-shadow pr-10" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" id="togglePassword" type="button"><span class="material-symbols-outlined text-[20px]" id="visibilityIcon">visibility_off</span></button>
</div>
</div>
<div class="flex items-center gap-sm">
<input class="rounded border-outline-variant text-primary focus:ring-primary" id="remember" name="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="remember">Remember session</label>
</div>
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg rounded-card py-sm shadow-level-2 hover:bg-[#003ea8] transition-colors flex justify-center items-center mt-sm" id="submitBtn" style="background-color: rgb(37, 99, 235);" type="submit">
<span class="" id="btnText">Sign In</span>
<span class="hidden material-symbols-outlined animate-spin ml-2 text-[20px]" data-original-icon="progress_activity" id="btnLoading">circle</span>
</button>
</form>
<!-- Bottom Section -->
<div class="mt-xl">
<div class="flex items-center gap-sm mb-lg">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">New to AssetFlow?</span>
<div class="h-px bg-outline-variant flex-1"></div>
</div>
<button class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface font-label-lg text-label-lg rounded-card py-sm shadow-level-2 hover:bg-surface-container transition-colors mb-md" type="button">
                Create Employee Account
            </button>
<div class="bg-surface-container-low rounded-card p-sm flex items-start gap-sm border border-outline-variant">
<span class="material-symbols-outlined text-primary text-[20px] mt-0.5">info</span>
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Creating an account registers you as an Employee. Administrative roles are assigned later by the system administrator.
                </p>
</div>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const emailError = document.getElementById('emailError');
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('togglePassword');
            const visibilityIcon = document.getElementById('visibilityIcon');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');

            // Password visibility toggle
            togglePasswordBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                visibilityIcon.textContent = type === 'password' ? 'visibility_off' : 'visibility';
            });

            // Form submission simulation
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                // Simple email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(emailInput.value)) {
                    emailError.classList.remove('hidden');
                    emailInput.classList.add('border-error');
                    return;
                } else {
                    emailError.classList.add('hidden');
                    emailInput.classList.remove('border-error');
                }

                // Loading state
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
                btnText.classList.add('hidden');
                btnLoading.classList.remove('hidden');

                // Simulate a login request
                setTimeout(() => {
                    sessionStorage.setItem('isAuthenticated', 'true');
                    window.location.href = 'dashboard.html';
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                    btnText.classList.remove('hidden');
                    btnLoading.classList.add('hidden');
                }, 2000);
            });
        });
    </script>
</body>
</html>
